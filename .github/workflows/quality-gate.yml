name: Quality Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-naming-convention:
    uses: KNMentorAGH/.github/.github/workflows/naming-convention.yml@main

  format:
    needs: [check-naming-convention]
    uses: KNMentorAGH/.github/.github/workflows/reusable-format.yml@main
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: [format]
    uses: KNMentorAGH/.github/.github/workflows/reusable-build.yml@main

  test:
    needs: [build]
    uses: KNMentorAGH/.github/.github/workflows/reusable-test.yml@main
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  label-check:
    uses: KNMentorAGH/.github/.github/workflows/reusable-label-enforcer.yml@main
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}